<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Josef Hartsough — Software Engineering &amp; IT Manager">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#182449"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="900" height="260" rx="16"/>
    </clipPath>

    <clipPath id="p1clipPath"><rect id="p1clipRect" x="72" y="170" width="0" height="26"><animate id="p1type" attributeName="width" from="0" to="408" dur="1.2s" begin="0s;p4fade.end" fill="freeze"/></rect></clipPath>
    <clipPath id="p2clipPath"><rect id="p2clipRect" x="72" y="170" width="0" height="26"><animate id="p2type" attributeName="width" from="0" to="330" dur="1.2s" begin="p1fade.end" fill="freeze"/></rect></clipPath>
    <clipPath id="p3clipPath"><rect id="p3clipRect" x="72" y="170" width="0" height="26"><animate id="p3type" attributeName="width" from="0" to="348" dur="1.2s" begin="p2fade.end" fill="freeze"/></rect></clipPath>
    <clipPath id="p4clipPath"><rect id="p4clipRect" x="72" y="170" width="0" height="26"><animate id="p4type" attributeName="width" from="0" to="480" dur="1.2s" begin="p3fade.end" fill="freeze"/></rect></clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="900" height="260" fill="url(#bgGrad)"/>
    <rect width="900" height="260" fill="url(#dots)"/>
    <circle cx="820" cy="30" r="140" fill="url(#glow)"/>
    <rect width="900" height="34" fill="#ffffff" fill-opacity="0.04"/>
    <line x1="0" y1="34" x2="900" y2="34" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="24" cy="17" r="6" fill="#ff5f56"/>
    <circle cx="46" cy="17" r="6" fill="#ffbd2e"/>
    <circle cx="68" cy="17" r="6" fill="#27c93f"/>
    <text x="450" y="21" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#ffffff" fill-opacity="0.45">josef@github — zsh</text>
  </g>
  <rect x="0.5" y="0.5" width="899" height="259" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <text x="48" y="90" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="16" fill="#7dd3fc">$ <tspan fill="#9aa4b2">whoami</tspan></text>

  <text x="48" y="145" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="44" font-weight="700" fill="url(#nameGrad)">Josef Hartsough</text>
  <text x="48" y="168" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14" fill="#9aa4b2" fill-opacity="0.8">Software Engineering &amp; IT Manager</text>

  <text x="48" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#7dd3fc">&gt;</text>

  <g id="p1group" opacity="0">
    <animate id="p1fade" attributeName="opacity" values="1;1;0" keyTimes="0;0.8;1" dur="4s" begin="0s;p4fade.end" fill="freeze"/>
    <text x="72" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#e2e8f0" clip-path="url(#p1clipPath)">Full-Stack Developer &amp; Team Lead</text>
    <rect y="176" width="3" height="22" fill="#7dd3fc">
      <animate attributeName="x" from="72" to="480" dur="1.2s" begin="0s;p4fade.end" fill="freeze"/>
      <animate attributeName="fill-opacity" values="1;0;1" dur="0.9s" begin="p1type.end" repeatCount="indefinite"/>
    </rect>
  </g>

  <g id="p2group" opacity="0">
    <animate id="p2fade" attributeName="opacity" values="1;1;0" keyTimes="0;0.8;1" dur="4s" begin="p1fade.end" fill="freeze"/>
    <text x="72" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#e2e8f0" clip-path="url(#p2clipPath)">Cloud &amp; Systems Architect</text>
    <rect y="176" width="3" height="22" fill="#7dd3fc">
      <animate attributeName="x" from="72" to="402" dur="1.2s" begin="p1fade.end" fill="freeze"/>
      <animate attributeName="fill-opacity" values="1;0;1" dur="0.9s" begin="p2type.end" repeatCount="indefinite"/>
    </rect>
  </g>

  <g id="p3group" opacity="0">
    <animate id="p3fade" attributeName="opacity" values="1;1;0" keyTimes="0;0.8;1" dur="4s" begin="p2fade.end" fill="freeze"/>
    <text x="72" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#e2e8f0" clip-path="url(#p3clipPath)">AWS · C# · Rust · TypeScript</text>
    <rect y="176" width="3" height="22" fill="#7dd3fc">
      <animate attributeName="x" from="72" to="420" dur="1.2s" begin="p2fade.end" fill="freeze"/>
      <animate attributeName="fill-opacity" values="1;0;1" dur="0.9s" begin="p3type.end" repeatCount="indefinite"/>
    </rect>
  </g>

  <g id="p4group" opacity="0">
    <animate id="p4fade" attributeName="opacity" values="1;1;0" keyTimes="0;0.8;1" dur="4s" begin="p3fade.end" fill="freeze"/>
    <text x="72" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#e2e8f0" clip-path="url(#p4clipPath)">Building things that run the shop floor</text>
    <rect y="176" width="3" height="22" fill="#7dd3fc">
      <animate attributeName="x" from="72" to="552" dur="1.2s" begin="p3fade.end" fill="freeze"/>
      <animate attributeName="fill-opacity" values="1;0;1" dur="0.9s" begin="p4type.end" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
